version: "3.8"
services:
  pho-agent:
    image: registry.crbgroup.cloud/pho-agent:latest
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3012
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://booking-mcp-server:3000/mcp}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_QUERIES_PER_SESSION=${MAX_QUERIES_PER_SESSION:-30}
    ports:
      - "3012:3012"
    networks:
      my_custom_network:
        ipv4_address: ${APP_IP}
        
networks:
  my_custom_network:
    external: true